# vllm production-stack 的 values(先小模型打通,再换 7B)
servingEngineSpec:
  runtimeClassName: ""             # TODO(你来改): k3s+GPU Operator 通常填 "nvidia";怎么确认?kubectl get runtimeclass
  modelSpec:
    - name: "opt125m"              # 第一步: 先用这个 250MB 小模型打通全链路
      repository: "vllm/vllm-openai"
      tag: "v0.10.2"               # TODO(你来改): 固定当前稳定版,禁止 latest。问题: 为什么?
      modelURL: "facebook/opt-125m"
      replicaCount: 1
      requestCPU: 4
      requestMemory: "8Gi"
      requestGPU: 1
      pvcStorage: "20Gi"           # 权重缓存: Pod 重启不重新下载。问题: 没有 PVC 时扩容为什么慢?
