apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: vllm-scaler
  namespace: inference
  annotations:
    llm-infra/capacity-note: "Single L20 GPU: raise maxReplicaCount only after adding GPU capacity or supported sharing"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: inference-qwen25-1-5b-deployment-vllm
  pollingInterval: 15
  cooldownPeriod: 300
  minReplicaCount: 1
  maxReplicaCount: 1
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090
        query: sum(vllm:num_requests_waiting)
        threshold: "5"
        ignoreNullValues: "false"
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleDown:
          stabilizationWindowSeconds: 600
          policies:
            - type: Pods
              value: 1
              periodSeconds: 60
