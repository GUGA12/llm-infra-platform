apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata: {name: vllm-scaler, namespace: inference}
spec:
  scaleTargetRef:
    name: vllm-opt125m-deployment-vllm   # TODO(验证): kubectl get deploy -n inference 核对真名
  minReplicaCount: 1
  maxReplicaCount: 2                     # TODO(你来改): 单卡集群最多1;演示扩容需 time-slicing 或第二张卡
  cooldownPeriod: 600                    # 问题: 为什么 vLLM 缩容冷静期要比无状态服务长?
  triggers:
    - type: prometheus
      metadata:
        serverAddress: http://kube-prometheus-stack-prometheus.monitoring:9090   # TODO(验证): svc 真名
        query: sum(vllm:num_requests_waiting)
        threshold: "10"                  # TODO(你来改): 压测得出单副本安全并发后回填
