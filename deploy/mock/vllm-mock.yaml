# [推理层|B类|仅kind循环] 假OpenAI后端: 让chat-api/网关/限流在无GPU时可端到端验证
# Service名故意叫 vllm-router-service, 与真实推理层同名同端口 -> 上层配置零改动
# 问题: 这种"契约替身"思路在企业里叫什么? 上GPU后这个文件怎么处理?
apiVersion: v1
kind: Namespace
metadata: {name: inference}
---
apiVersion: v1
kind: ConfigMap
metadata: {name: vllm-mock-app, namespace: inference}
data:
  app.py: |
    import json, time
    from http.server import BaseHTTPRequestHandler, HTTPServer
    class H(BaseHTTPRequestHandler):
        def _send(self, code, obj):
            body = json.dumps(obj).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.end_headers(); self.wfile.write(body)
        def do_GET(self):
            if self.path == "/v1/models":
                self._send(200, {"object":"list","data":[{"id":"mock-model","object":"model"}]})
            elif self.path == "/metrics":
                self.send_response(200); self.end_headers()
                self.wfile.write(b"vllm:num_requests_waiting 0\n")  # 让SM/KEDA链路也能演练
            else: self._send(200, {"ok": True})
        def do_POST(self):
            n = int(self.headers.get("Content-Length", 0)); _ = self.rfile.read(n)
            time.sleep(0.3)   # 模拟推理延迟
            self._send(200, {
              "id":"mock","object":"chat.completion","model":"mock-model",
              "choices":[{"index":0,"message":{"role":"assistant","content":"mock reply"},"finish_reason":"stop"}],
              "usage":{"prompt_tokens":12,"completion_tokens":8,"total_tokens":20}})
    HTTPServer(("0.0.0.0", 8000), H).serve_forever()
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-mock
  namespace: inference
  labels: {app: vllm-mock}
spec:
  replicas: __TODO__                 # 练限流/压测想要几个副本?
  selector: {matchLabels: {app: vllm-mock}}
  template:
    metadata:
      labels: {app: vllm-mock, environment: router}   # environment:router给SM练手用
    spec:
      containers:
        - name: mock
          image: python:3.12-slim
          command: ["python", "/srv/app.py"]
          ports: [{containerPort: 8000}]
          volumeMounts: [{name: app, mountPath: /srv}]
          resources:
            requests: {cpu: 50m, memory: 64Mi}
      volumes:
        - name: app
          configMap: {name: vllm-mock-app}
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-router-service          # 与真实router同名, 上层零改动
  namespace: inference
  labels: {environment: router}
spec:
  selector: {app: vllm-mock}
  ports:
    - name: __TODO__                 # 端口名: 你的vllm.yaml SM里endpoints.port填的什么,这里就叫什么
      port: 80
      targetPort: 8000
