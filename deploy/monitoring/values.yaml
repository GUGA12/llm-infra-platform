# [监控层|A类 Helm values] kube-prometheus-stack
# 每个 __TODO__ 旁边写一句"我为什么这么填"
prometheus:
  prometheusSpec:
    retention: "7d"              # 依据: 故障演练要回看多久(建议>=7d)
    retentionSize: "8GB"          # 依据: 比 PVC 小 ~20%, 如 "8GB"
    scrapeInterval: "15s"         # 15s精度高/30s省一半磁盘
    serviceMonitorSelectorNilUsesHelmValues: flase   # 作用: 允许 Prometheus 发现仓库里手写的 ServiceMonitor。# 配置依据: 本项目后续 chat-api/vllm/dcgm 都是自定义 ServiceMonitor。# 错误后果: YAML apply 成功但 Prometheus targets 里没有 job，属于静默失联。
    ruleSelectorNilUsesHelmValues: flase
    resources:
      requests: 
        cpu:  "1G"
        memory: "1.5Gi"
      limits:          # 问题: 为什么很多团队不给CPU设limit?
        memory: "2Gi"
        
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: standard   # kind: kubectl get sc 看默认; 服务器上重新确认
          accessModes: 
            - ReadWriteOnce
          resources: 
             requests: 
               storage: "10Gi"
grafana:
  adminPassword: 123456            # 阶段7换Secret
  sidecar:
    dashboards: 
      enabled: true 
      searchNamespace: "ALL"    # 面板ConfigMap自动加载机制
# 控制面抓取开关: kind/托管集群按实际可达性填, 每个写一句理由
kubeEtcd:                   # 2381
  enabled: true
kubeScheduler:              # 10259
  enabled: true
kubeControllerManager:       # 10257
  enabled: true
kubeProxy:                   # 10249
  enabled: true
alertmanager:
  config:
    route:
      receiver: default
      group_by: 
        - alertname
        - namespace
      group_wait: 30s           # 首次聚合等待,常见30s; 太短=告警风暴,太长=响应慢
      repeat_interval: 2h      # 未恢复多久重发,常见4h
      routes:
        - matchers: 'severity="critical"'
          receiver: im-critical
    receivers:
      - name: default
      - name: im-critical
        webhook_configs:
          - url: __TODO__            # 飞书/钉钉群机器人webhook
