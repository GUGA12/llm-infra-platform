# [监控层|E类] GPU 告警。阈值=参数,由你定;表达式结构我给全
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata: {name: gpu-rules, namespace: monitoring}
spec:
  groups:
    - name: gpu.rules
      rules:
        - alert: GPUHighTemperature
          expr: DCGM_FI_DEV_GPU_TEMP > 80     # 依据: 查你显卡的降频温度(4090/A10各不同)
          for: 5m                              # 瞬时尖峰要不要报?
          labels: {severity: warning}
          annotations:
            summary: "GPU {{ $labels.gpu }} on {{ $labels.Hostname }} temp {{ $value }}C"
            runbook: docs/runbook/gpu-temp.md
        - alert: GPUMemoryNearFull
          expr: DCGM_FI_DEV_FB_USED / (DCGM_FI_DEV_FB_USED + DCGM_FI_DEV_FB_FREE) > 0.95  # vLLM常驻高显存,阈值该给多少才不误报?
          for: 10m
          labels: {severity: warning}
        - alert: GPUXidError
          expr: DCGM_FI_DEV_XID_ERRORS > 0   # XID是硬件级错误,0容忍,不留TODO
          labels: {severity: critical}
          annotations: {runbook: docs/runbook/gpu-xid.md}
        - alert: DCGMExporterAbsent
          expr: absent(DCGM_FI_DEV_GPU_UTIL)
          for: 5m
          labels: {severity: critical}   # 元监控: 采集器自己挂了
