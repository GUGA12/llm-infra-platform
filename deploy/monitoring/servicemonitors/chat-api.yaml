# [监控层|B类] 抓自研业务服务
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: chat-api
  namespace: monitoring
spec:
  namespaceSelector: 
    matchNames: 
      - apps
  selector:
    matchLabels:
      app: chat-api                  # 与 chart Service 的 labels 对齐(去 templates/service.yaml 里找)
  endpoints:
    - port: http                 # Service里给端口起的"名"
      path: /metrics
      interval: 15s
