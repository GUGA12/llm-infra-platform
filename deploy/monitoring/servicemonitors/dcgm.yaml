# 让 Prometheus 抓 DCGM Exporter(GPU Operator 装好后才有这个 Service)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dcgm-exporter
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames: [gpu-operator]     # 问题: 为什么要跨 namespace 选择?
  selector:
    matchLabels:
      app: nvidia-dcgm-exporter    # TODO(验证): kubectl get svc -n gpu-operator --show-labels 核对真实标签
  endpoints:
    - port: gpu-metrics            # TODO(验证): 端口名以实际 Service 为准(9400)
      interval: 15s
