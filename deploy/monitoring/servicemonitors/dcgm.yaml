# [监控层|B类] 抓 DCGM Exporter(GPU指标)。GPU阶段才有目标,kind里它会是0 target,不算错
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: dcgm-exporter
  namespace: monitoring
spec:
  namespaceSelector:
    matchNames: 
      - gpu-operator
  selector:
    matchLabels:
      app: nvidia-dcgm-exporter                 # TODO(验证): kubectl get svc -n gpu-operator --show-labels
  endpoints:
    - port: gpu-metrics
      path: /metrics                  # TODO(验证): 端口"名"不是数字; kubectl get svc ... -o yaml 看 ports[].name
      interval: 15s
