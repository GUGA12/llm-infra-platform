# [监控层|B类] 抓 vLLM Router+Engine 指标(kind循环里目标是mock,同样能验证发现机制)
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: vllm
  namespace: monitoring
spec:
  namespaceSelector: 
    matchNames: 
      - inference
  selector:
    matchLabels:      # TODO(验证): production-stack给Service打的真实标签
      environment: router
  endpoints:
    - port: router-sport
      path: /metrics
      interval: 15s
