apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: llm-gw
  namespace: gateway
spec:
  gatewayClassName: eg
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: public-nodeport-proxy
  listeners:
    - name: https
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: llm-gw-selfsigned-tls
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              llm-infra/gateway-access: "true"
