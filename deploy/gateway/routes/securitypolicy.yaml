# API Key credential is created out-of-band as apps/chat-api-public-key.
# Never commit the actual key to Git.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: SecurityPolicy
metadata:
  name: llm-auth
  namespace: apps
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: chat-api
  apiKeyAuth:
    credentialRefs:
      - group: ""
        kind: Secret
        name: chat-api-public-key
    extractFrom:
      - headers:
          - x-api-key
    forwardClientIDHeader: x-client-id
    sanitize: true
