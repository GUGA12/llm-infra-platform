apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: chat-api, namespace: apps}
spec:
  parentRefs: [{name: llm-gw, namespace: gateway}]
  hostnames: ["chat.example.local"]  # TODO(你来改): 本地先改 /etc/hosts 指到网关 IP
  rules:
    - matches: [{path: {type: PathPrefix, value: /api}}]
      backendRefs: [{name: chat-api, port: 80}]
