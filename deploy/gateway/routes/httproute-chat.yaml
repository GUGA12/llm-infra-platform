# [网关层|B类] 业务路由: 外部路径 -> chat-api
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata: {name: chat-api, namespace: apps}   # 放业务ns而非网关ns: 谁拥有路由,企业里是这么分权的
spec:
  parentRefs:
    - {name: llm-gw, namespace: gateway}
  hostnames: [chat.lab.local]              # 本地域名; /etc/hosts 或 curl --resolve 怎么配合?
  rules:
    - matches:
        - path: {type: PathPrefix, value: /api/v1/chat}
      backendRefs:
        - name: chat-api             # chart渲染出的Service名(helm template自查)
          port: 80
