apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chat-api
  namespace: apps
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: llm-gw
      namespace: gateway
  hostnames:
    - chat.lab.local
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1/chat
      backendRefs:
        - group: ""
          kind: Service
          name: chat-api
          port: 80
