# [业务层|C类] 自研chart的"问卷"。模板在templates/, 每个值都被哪行模板消费,要能指出来
image:
  repository: ghcr.io/guga12/chat-api              # ghcr.io/<你的用户名>/chat-api
  tag: "beafe63a3e74d44218de4fb90d588c21cffc50d8"  # CI会自动改这一行(见ci-chat-api.yaml的sed), 所以格式别动
replicaCount: 1                 # HPA最小维持1个副本
resources:
  requests: {cpu: 200m, memory: 256Mi}
  limits: {cpu: 1, memory: 1Gi}
env:
  VLLM_BASE_URL: http://inference-router-service.inference.svc.cluster.local/v1
  MODEL_NAME: Qwen/Qwen2.5-1.5B-Instruct
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPU: 70
