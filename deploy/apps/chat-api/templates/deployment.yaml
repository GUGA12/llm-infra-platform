apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  labels: {app: {{ .Release.Name }}}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {app: {{ .Release.Name }}}     # 问题: selector 和 template.labels 不一致会怎样?(故意改错试一次)
  template:
    metadata:
      labels: {app: {{ .Release.Name }}}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: chat-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports: [{containerPort: 8080}]
          env:
            {{- range $k, $v := .Values.env }}
            - {name: {{ $k }}, value: {{ $v | quote }}}
            {{- end }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          readinessProbe:
            httpGet: {path: /healthz, port: 8080}
            initialDelaySeconds: 3
            periodSeconds: 5              # 练习: 把 path 改成 /wrong 观察 Endpoints 变化,再修好
          livenessProbe:
            httpGet: {path: /healthz, port: 8080}
            periodSeconds: 10
          lifecycle:
            preStop:
              exec: {command: ["sleep", "10"]}   # 问题: preStop sleep 解决滚动更新的什么问题?
      terminationGracePeriodSeconds: 30
