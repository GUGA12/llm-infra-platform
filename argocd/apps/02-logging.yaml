apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: logging
  namespace: argocd
  annotations: {argocd.argoproj.io/sync-wave: "2"}
spec:
  project: default
  sources:
    - repoURL: https://grafana.github.io/helm-charts
      chart: loki
      targetRevision: "6.29.0"         # TODO(你来改): 固定版本
      helm: {valueFiles: [$values/deploy/logging/loki-values.yaml]}
    - repoURL: https://grafana.github.io/helm-charts
      chart: alloy
      targetRevision: "1.0.3"          # TODO(你来改)
      helm: {valueFiles: [$values/deploy/logging/alloy-values.yaml]}
    - repoURL: https://github.com/GUGA12/llm-infra-platform.git   # TODO(你来改)
      targetRevision: main
      ref: values
  destination: {server: https://kubernetes.default.svc, namespace: logging}
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions: [CreateNamespace=true]
