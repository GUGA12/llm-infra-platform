apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  sources:
    - repoURL: https://prometheus-community.github.io/helm-charts
      chart: kube-prometheus-stack
      targetRevision: "87.16.1"
      helm:
        valueFiles:
          - $values/deploy/monitoring/values.yaml
    - repoURL: https://github.com/GUGA12/llm-infra-platform.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/GUGA12/llm-infra-platform.git
      targetRevision: main
      path: deploy/monitoring/servicemonitors
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      enabled: false
      prune: false
      selfHeal: false
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
