apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apps
  namespace: argocd
  annotations: {argocd.argoproj.io/sync-wave: "30"}
spec:
  project: default
  sources:
    # Self-developed chat API chart in this repository.
    - repoURL: https://github.com/GUGA12/llm-infra-platform.git
      targetRevision: main
      path: deploy/apps/chat-api
      helm: {releaseName: chat-api}
    # Browser UI for the chat API; no API key is embedded in this chart.
    - repoURL: https://github.com/GUGA12/llm-infra-platform.git
      targetRevision: main
      path: deploy/apps/chat-ui
      helm: {releaseName: chat-ui}
    # Dify placeholder: select and pin a community chart before enabling it.
    # - repoURL: TODO
    #   chart: dify
    #   targetRevision: TODO
    #   helm: {valueFiles: [$values/deploy/apps/dify/values.yaml]}
  destination: {server: https://kubernetes.default.svc, namespace: apps}
  syncPolicy:
    automated: {prune: true, selfHeal: true}
    syncOptions: [CreateNamespace=true]
