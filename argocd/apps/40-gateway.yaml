apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gateway
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "40"
spec:
  project: default
  sources:
    - repoURL: docker.io/envoyproxy
      chart: gateway-helm
      targetRevision: "v1.8.2"
      helm:
        releaseName: eg
    - repoURL: https://github.com/GUGA12/llm-infra-platform.git
      targetRevision: main
      path: deploy/gateway/routes
      directory:
        recurse: true
        # These require Envoy AI Gateway or production credentials. Keep them
        # outside the standard HTTP Gateway rollout.
        exclude: '{aigatewayroute.yaml,backendtrafficpolicy-ratelimit.yaml,referencegrant.yaml,secret-api-keys.example.yaml}'
  destination:
    server: https://kubernetes.default.svc
    namespace: gateway
  syncPolicy:
    automated:
      enabled: true
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
